<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Te amo</title>
    <link rel="stylesheet" href="css/music.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a href="javascript:history.back()" class="back-arrow" title="Volver">
      <svg viewBox="0 0 24 24" width="40" height="40">
        <path
          d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
          fill="#e91e63"
        />
      </svg>
    </a>

    <div class="background">
      <header class="header-section">
        <h1 class="main-title">Cree esto para ti:</h1>
        <p class="subtitle">Te la dedico amor, te amo mucho</p>
      </header>

      <div class="music-container">
        <div class="vinyl-wrapper">
          <div class="vinyl-disk"></div>
          <div class="spotify-card">
            <iframe
              data-testid="embed-iframe"
              style="border-radius: 12px"
              src="https://open.spotify.com/embed/playlist/4r4qYdysaWBk0LRig588nY?utm_source=generator"
              width="100%"
              height="352"
              frameborder="0"
              allowfullscreen=""
              allow="
                autoplay;
                clipboard-write;
                encrypted-media;
                fullscreen;
                picture-in-picture;
              "
              loading="lazy"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
    <div id="hearts-container"></div>
    <script src="js/music.js"></script>
  </body>
</html>
