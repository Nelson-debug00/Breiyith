<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Te amo</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a href="javascript:history.back()" class="back-arrow" title="Volver">
      <svg viewBox="0 0 24 24" width="40" height="40">
        <path
          d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
          fill="#e91e63"
        />
      </svg>
    </a>
    <main class="page-container">
      <header class="page-header">
        <h1>Escoge una de estas opciones:</h1>
      </header>

      <section class="options-container" id="optionsContainer">
        <a href="pictures.html">
          <button class="option-card" id="option1">
            <div class="option-content">
              <img
                src="img/stitch1.png"
                alt="Stitch"
                class="bear-img bear-pair"
              />
            </div>
          </button>
        </a>

        <a href="music.html">
          <button class="option-card" id="option2">
            <div class="option-content">
              <img
                src="img/stitch2.png"
                alt="Stitch"
                class="bear-img single-bear"
              />
            </div>
          </button>
        </a>

        <a href="contador.html">
          <button class="option-card" id="option3">
            <div class="option-content">
              <img
                src="img/stitch3.png"
                alt="Stitch"
                class="bear-img letter-bear"
              />
            </div>
          </button>
        </a>

        <a href="book.html">
          <button class="option-card" id="option4">
            <div class="option-content">
              <img
                src="img/stitch6.png"
                alt="Stitch"
                class="bear-img letter-bear"
              />
            </div>
          </button>
        </a>

        <a href="galery.html">
          <button class="option-card" id="option5">
            <div class="option-content">
              <img
                src="img/stitch4.png"
                alt="Stitch"
                class="bear-img letter-bear"
              />
            </div>
          </button>
        </a>

        <a href="carta.html">
          <button class="option-card" id="option6">
            <div class="option-content">
              <img
                src="img/stitch5.png"
                alt="Stitch"
                class="bear-img2 letter-bear"
              />
            </div>
          </button>
        </a>
      </section>

      <div id="selectionMessage" class="selection-message hidden"></div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
